services:
  # Backend Service
  - type: web
    name: wellbeing-sensingg-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./wellbeing.db
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Service
  - type: web
    name: wellbeing-sensingg-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
